# nginx vhost for the Headscale control plane
# Destination: /etc/nginx/sites-available/mesh.tinyglobalvillage.com
# Symlink:     /etc/nginx/sites-enabled/mesh.tinyglobalvillage.com
#
# certbot --nginx -d mesh.tinyglobalvillage.com will inject the
# `ssl_certificate*` directives + the :80 → :443 redirect.

# WebSocket upgrade map (declared once at http{} level; safe to repeat in site
# scope since nginx dedupes by name. Keep here so the file is self-contained.)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name mesh.tinyglobalvillage.com;

    # certbot writes its ACME challenge here; leave plain HTTP open for renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mesh.tinyglobalvillage.com;

    # Headscale ships protocol buffers over both HTTP/1.1 (control) and HTTP/2
    # (Noise + DERP). nginx negotiates per-connection — keep both available.

    # Large body limit so binary node-key uploads + map responses don't get
    # truncated. Headscale map responses can run several MB for big tailnets.
    client_max_body_size 50M;
    client_body_buffer_size 1m;

    # Long timeouts — control-plane streams stay open while clients poll.
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 60s;
    keepalive_timeout   90s;

    # certbot --nginx will replace these placeholder paths.
    ssl_certificate     /etc/letsencrypt/live/mesh.tinyglobalvillage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mesh.tinyglobalvillage.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers — Headscale serves no browser UI, but harden anyway.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "no-referrer" always;

    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / HTTP/2 upgrade — required for Headscale's long-lived
        # Noise streams and the DERP relay handshake.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Don't buffer streaming responses (poll endpoints).
        proxy_buffering   off;
        proxy_request_buffering off;
        proxy_redirect    off;
    }
}
