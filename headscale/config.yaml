# Headscale main configuration
# Destination: /etc/headscale/config.yaml
# Owner: headscale:headscale, mode 0640
#
# Headscale is the open-source self-hosted Tailscale control server.
# This config terminates the control plane locally on 127.0.0.1:8080 and is
# fronted by nginx at https://mesh.tinyglobalvillage.com (see nginx-mesh.conf).

# The public URL clients connect to. MUST match the cert CN and the URL the
# tailscale client uses in `tailscale up --login-server=...`.
server_url: https://mesh.tinyglobalvillage.com

# Bind to loopback only — nginx fronts TLS and proxies to this address.
listen_addr: 127.0.0.1:8080

# Prometheus metrics endpoint (loopback only — scraped locally or via SSH tunnel).
metrics_listen_addr: 127.0.0.1:9090

# gRPC admin socket — used by the `headscale` CLI on the same host.
grpc_listen_addr: 127.0.0.1:50443
grpc_allow_insecure: false

# Long-lived control-plane keys. Generated automatically on first run if absent.
private_key_path: /var/lib/headscale/private.key
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# Tailnet address space. 100.64.0.0/10 is the IANA CGNAT block Tailscale uses.
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

# DERP relay map. Use Tailscale's public DERP fleet — no need to run our own.
derp:
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  paths: []
  auto_update_enabled: true
  update_frequency: 24h
  server:
    enabled: false

# Disable update check (we pin Headscale versions via the install script).
disable_check_updates: true

# How long an idle node stays in the tailnet before being garbage-collected.
ephemeral_node_inactivity_timeout: 30m

# SQLite database — sufficient for <100 nodes; switch to Postgres if we ever
# outgrow that (we won't for the foreseeable future on this RCS box).
database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true

# Logging — text format keeps it grep-friendly for journalctl and our audit log.
log:
  level: info
  format: text

# DNS — MagicDNS off for Phase 1. We'll wire it up once peers are stable.
# override_local_dns must be false when nameservers.global is empty (Headscale
# refuses to start otherwise). base_domain must differ from server_url's host
# (also a Headscale validation), so we use a distinct internal-only suffix.
dns:
  override_local_dns: false
  magic_dns: false
  base_domain: mesh.internal
  nameservers:
    global: []
  search_domains: []
  extra_records: []

# ACL policy — empty path = default-allow inside the tailnet. UFW + per-host
# sshd rules gate the actual SSH/admin surface; the mesh itself is open between
# peers so the killswitch we add later is the single chokepoint.
policy:
  mode: file
  path: ""

# OIDC disabled. Auth is via preauthkeys generated by the operator from the CLI
# (and surfaced in the Mesh VPN HCM later).
oidc:
  only_start_if_oidc_is_available: false

# Unix socket for `headscale` CLI on the same host.
unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"
